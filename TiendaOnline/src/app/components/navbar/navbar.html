<nav
  class="bg-neutral-950 text-white px-6 py-3 flex items-center justify-between gap-8 sticky top-0 z-50 shadow-lg"
  aria-label="Navegación principal"
>
  <!-- Logo -->
  <a
    routerLink="/"
    class="text-xl font-bold tracking-widest uppercase text-white hover:text-neutral-300 transition-colors shrink-0 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
    aria-label="KICKstore — ir al inicio"
  >
    KICKstore
  </a>

  <!-- Centro: enlaces de navegación -->
  <ul class="flex items-center gap-6 list-none m-0 p-0 flex-1" role="list">
    <li>
      <a
        routerLink="/"
        class="text-sm font-medium text-neutral-300 hover:text-white transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white rounded"
      >
        Inicio
      </a>
    </li>
    <li>
      <a
        routerLink="/catalogo"
        class="text-sm font-medium text-neutral-300 hover:text-white transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white rounded"
      >
        Catálogo
      </a>
    </li>

    @if (isAdmin()) {
      <li>
        <a
          routerLink="/admin/productos"
          class="text-sm font-medium text-amber-400 hover:text-amber-300 transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-amber-400 rounded"
        >
          Admin · Productos
        </a>
      </li>
      <li>
        <a
          routerLink="/admin/pedidos"
          class="text-sm font-medium text-amber-400 hover:text-amber-300 transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-amber-400 rounded"
        >
          Admin · Pedidos
        </a>
      </li>
    }

    @if (isLoggedIn() && !isAdmin()) {
      <li>
        <a
          routerLink="/mis-pedidos"
          class="text-sm font-medium text-neutral-300 hover:text-white transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white rounded"
        >
          Mis pedidos
        </a>
      </li>
    }
  </ul>

  <!-- Derecha: acciones de usuario -->
  <div class="flex items-center gap-4 shrink-0">
    @if (!isLoggedIn()) {
      <a
        routerLink="/login"
        class="text-sm font-semibold bg-white text-neutral-950 px-4 py-2 rounded-full hover:bg-neutral-200 transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
      >
        Iniciar sesión
      </a>
    } @else {
      <span class="text-sm text-neutral-400" aria-label="Usuario: {{ userName() }}">
        {{ userName() }}
      </span>

      @if (!isAdmin()) {
        <a
          routerLink="/carrito"
          class="relative flex items-center text-neutral-300 hover:text-white transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white rounded"
          [attr.aria-label]="'Carrito de compra, ' + cartCount() + ' artículos'"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-6 h-6"
            aria-hidden="true"
            focusable="false"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
            />
          </svg>
          <span
            class="absolute -top-2 -right-2.5 bg-white text-neutral-950 text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center leading-none"
            aria-hidden="true"
          >
            {{ cartCount() }}
          </span>
        </a>
      }

      <button
        type="button"
        (click)="logout()"
        class="text-sm font-medium text-neutral-300 hover:text-white border border-neutral-700 px-3 py-1.5 rounded-full hover:border-neutral-400 transition-colors cursor-pointer focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
        aria-label="Cerrar sesión"
      >
        Salir
      </button>
    }
  </div>
</nav>
