<nav class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between shadow-md">
  
  <a routerLink="/" class="text-2xl font-bold text-lime-400 hover:text-lime-300">
    PEGSTORE
  </a>

  
  <ul class="flex items-center gap-6 list-none m-0 p-0 flex-1 ml-8">
    <li>
      <a routerLink="/" class="text-white hover:text-lime-400">Inicio</a>
    </li>
    <li>
      <a routerLink="/catalogo" class="text-white hover:text-lime-400">Catálogo</a>
    </li>

    @if (isAdmin()) {
      <li>
        <a routerLink="/admin/productos" class="text-lime-400 hover:underline">Admin Productos</a>
      </li>
      <li>
        <a routerLink="/admin/pedidos" class="text-lime-400 hover:underline">Admin Pedidos</a>
      </li>
    }

    @if (isLoggedIn() && !isAdmin()) {
      <li>
        <a routerLink="/mis-pedidos" class="text-white hover:text-lime-400">Mis pedidos</a>
      </li>
    }
  </ul>

  
  <div class="flex items-center gap-4">
    @if (!isLoggedIn()) {
      <a routerLink="/login" class="bg-lime-400 text-gray-900 px-4 py-2 rounded font-bold hover:bg-lime-500">
        Iniciar sesión
      </a>
    } @else {
      <span class="text-sm">
        Hola, {{ userName() }}
      </span>

      @if (!isAdmin()) {
        <a routerLink="/carrito" class="flex items-center bg-gray-800 border border-gray-700 px-3 py-2 rounded hover:text-lime-400">
          <span>Carrito ({{ cartCount() }})</span>
        </a>
      }

      <button
        type="button"
        (click)="logout()"
        class="bg-gray-800 border border-gray-700 text-white px-4 py-2 rounded hover:bg-gray-700"
      >
        Salir
      </button>
    }
  </div>
</nav>
