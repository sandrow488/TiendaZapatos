<div class="min-h-screen bg-neutral-100 flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    
    <p class="text-center text-2xl font-extrabold tracking-widest uppercase text-neutral-950 mb-8">
      PEGSTORE
    </p>

    
    <div class="bg-white rounded-2xl shadow-sm px-8 py-10">
      <h1 class="text-xl font-bold text-neutral-900 mb-7">Iniciar sesión</h1>

      <form
        (ngSubmit)="onSubmit()"
        #loginForm="ngForm"
        novalidate
        aria-label="Formulario de inicio de sesión"
      >
        
        <div class="mb-5">
          <label
            for="login-email"
            class="block text-sm font-medium text-neutral-700 mb-1.5"
          >
            Email
          </label>
          <input
            id="login-email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            autocomplete="email"
            placeholder="tu@email.com"
            class="w-full rounded-lg border border-neutral-200 bg-neutral-50 px-3.5 py-2.5 text-sm text-neutral-900 placeholder:text-neutral-400 focus:outline-2 focus:outline-offset-1 focus:outline-neutral-950 transition"
            [attr.aria-required]="true"
          />
        </div>

        
        <div class="mb-7">
          <label
            for="login-password"
            class="block text-sm font-medium text-neutral-700 mb-1.5"
          >
            Contraseña
          </label>
          <input
            id="login-password"
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full rounded-lg border border-neutral-200 bg-neutral-50 px-3.5 py-2.5 text-sm text-neutral-900 placeholder:text-neutral-400 focus:outline-2 focus:outline-offset-1 focus:outline-neutral-950 transition"
            [attr.aria-required]="true"
          />
        </div>

        
        @if (errorMessage()) {
          <div
            role="alert"
            class="mb-5 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"
          >
            {{ errorMessage() }}
          </div>
        }

        
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full bg-neutral-950 text-white text-sm font-semibold py-3 rounded-full hover:bg-neutral-800 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed transition-all focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-neutral-950"
          [attr.aria-busy]="isLoading()"
        >
          @if (isLoading()) {
            <span aria-live="polite">Iniciando sesión…</span>
          } @else {
            Iniciar sesión
          }
        </button>
      </form>
    </div>

    
    <p class="text-center text-sm text-neutral-500 mt-6">
      ¿No tienes cuenta?
      <a
        routerLink="/registro"
        class="font-semibold text-neutral-900 underline underline-offset-2 hover:text-neutral-600 transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-neutral-950 rounded"
      >
        Regístrate
      </a>
    </p>

  </div>
</div>
